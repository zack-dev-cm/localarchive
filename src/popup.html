<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LocalArchive</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-shell">
    <main class="popup">
      <header class="popup-header">
        <div>
          <h1>LocalArchive</h1>
          <p id="status" role="status">Ready</p>
        </div>
      </header>
      <section class="popup-actions" aria-label="Actions">
        <button id="captureButton" class="primary" type="button">Capture</button>
        <button id="libraryButton" type="button">Library</button>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
